<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Config Diff — Chat LHB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/css/diff2html.min.css">
<script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/js/diff2html.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #38bdf8; --green: #4ade80; --red: #f87171;
    --yellow: #fbbf24; --purple: #a78bfa; --orange: #fb923c;
    --border: #334155; --card: #1e293b;
    --font: 'Sarabun', sans-serif; --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    line-height: 1.6; min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid var(--border); padding: 1.25rem 2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.01em; }
  .header h1 span { color: var(--accent); }
  .header .badge {
    font-size: 0.7rem; background: var(--bg3); padding: 0.2rem 0.6rem;
    border-radius: 999px; color: var(--text2); font-family: var(--mono);
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

  /* Upload Panel */
  .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 2rem;
    text-align: center; cursor: pointer; transition: all 0.2s;
    background: var(--bg2); position: relative; min-height: 140px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent); background: rgba(56, 189, 248, 0.05);
  }
  .upload-zone.loaded { border-color: var(--green); border-style: solid; }
  .upload-zone .label { font-size: 0.8rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .upload-zone .filename { font-family: var(--mono); font-size: 0.85rem; color: var(--accent); margin-top: 0.5rem; word-break: break-all; }
  .upload-zone .node-count { font-size: 0.8rem; color: var(--green); margin-top: 0.25rem; }
  .upload-zone .hint { font-size: 0.8rem; color: var(--text3); }
  .upload-zone input[type="file"] { display: none; }

  /* Compare Button */
  .compare-row { text-align: center; margin-bottom: 1.5rem; }
  .btn-compare {
    background: linear-gradient(135deg, #0ea5e9, #2563eb); color: #fff;
    border: none; padding: 0.75rem 3rem; border-radius: 8px; font-size: 1rem;
    font-family: var(--font); font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.02em;
  }
  .btn-compare:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3); }
  .btn-compare:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Summary Bar */
  .summary-bar {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.5rem; margin-bottom: 1rem; display: none;
  }
  .summary-bar.visible { display: block; }
  .summary-stats {
    display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center;
    margin-bottom: 0.75rem;
  }
  .stat { font-size: 0.85rem; }
  .stat .num { font-weight: 700; font-family: var(--mono); }
  .stat.added .num { color: var(--green); }
  .stat.removed .num { color: var(--red); }
  .stat.changed .num { color: var(--yellow); }
  .stat.same .num { color: var(--text3); }
  .summary-actions { display: flex; gap: 0.75rem; }
  .btn-sm {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    padding: 0.35rem 0.9rem; border-radius: 6px; font-size: 0.78rem;
    font-family: var(--font); cursor: pointer; transition: all 0.15s;
  }
  .btn-sm:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* Filter Tabs */
  .filter-tabs {
    display: none; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .filter-tabs.visible { display: flex; }
  .filter-tab {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
    padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.8rem;
    cursor: pointer; transition: all 0.15s; font-family: var(--font);
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--text); }
  .filter-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

  /* Change Cards */
  .results { display: none; }
  .results.visible { display: block; }
  .change-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 0.75rem; overflow: hidden;
  }
  .change-card summary {
    padding: 0.85rem 1.25rem; cursor: pointer; display: flex;
    align-items: center; gap: 0.75rem; font-size: 0.9rem;
    list-style: none; user-select: none;
  }
  .change-card summary::-webkit-details-marker { display: none; }
  .change-card summary .arrow {
    color: var(--text3); font-size: 0.85rem; transition: transform 0.15s;
    flex-shrink: 0; display: inline-block;
  }
  .change-card[open] summary .arrow { transform: rotate(90deg); }
  .type-badge {
    font-size: 0.7rem; font-family: var(--mono); padding: 0.15rem 0.5rem;
    border-radius: 4px; font-weight: 500; flex-shrink: 0;
  }
  .type-advancedRouter { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
  .type-model { background: #0ea5e922; color: #38bdf8; border: 1px solid #0ea5e944; }
  .type-intentAI { background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b44; }
  .type-queryRewriter { background: #10b98122; color: #34d399; border: 1px solid #10b98144; }
  .type-documents { background: #6366f122; color: #818cf8; border: 1px solid #6366f144; }
  .type-products { background: #ec489922; color: #f472b6; border: 1px solid #ec489944; }
  .type-response { background: #14b8a622; color: #2dd4bf; border: 1px solid #14b8a644; }
  .type-condition { background: #f9731622; color: #fb923c; border: 1px solid #f9731644; }
  .type-switch { background: #84cc1622; color: #a3e635; border: 1px solid #84cc1644; }
  .type-intentGroup { background: #eab30822; color: #fbbf24; border: 1px solid #eab30844; }
  .type-flowConfig { background: #06b6d422; color: #22d3ee; border: 1px solid #06b6d444; }
  .type-default { background: #64748b22; color: #94a3b8; border: 1px solid #64748b44; }
  .card-name { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-field { font-family: var(--mono); font-size: 0.75rem; color: var(--text3); flex-shrink: 0; }
  .card-chars { font-family: var(--mono); font-size: 0.75rem; color: var(--text2); flex-shrink: 0; white-space: nowrap; }
  .card-chars .plus { color: var(--green); }
  .card-chars .minus { color: var(--red); }
  .card-affects {
    font-size: 0.7rem; background: var(--bg3); padding: 0.1rem 0.5rem;
    border-radius: 4px; color: var(--yellow); flex-shrink: 0;
  }
  .card-body { padding: 0 1.25rem 1.25rem; }
  .card-body .affected-list {
    font-size: 0.78rem; color: var(--text2); margin-bottom: 0.75rem;
    padding: 0.5rem 0.75rem; background: var(--bg); border-radius: 6px;
  }

  /* Added/Removed cards */
  .change-card.added { border-left: 3px solid var(--green); }
  .change-card.removed { border-left: 3px solid var(--red); }
  .added-label { color: var(--green); font-weight: 600; }
  .removed-label { color: var(--red); font-weight: 600; }

  /* diff2html dark overrides */
  .d2h-wrapper { font-family: var(--mono) !important; font-size: 0.78rem !important; }
  .d2h-file-wrapper { border: 1px solid var(--border) !important; border-radius: 8px !important; overflow: hidden; }
  .d2h-file-header { display: none !important; }
  .d2h-code-wrapper { background: var(--bg) !important; }
  .d2h-code-line { padding: 0 0.5rem !important; }
  .d2h-code-side-line { background: var(--bg) !important; }
  .d2h-code-line-prefix { color: var(--text3) !important; }
  .d2h-code-line-ctn { color: var(--text) !important; word-break: break-word !important; white-space: pre-wrap !important; }
  .d2h-del { background: rgba(248, 113, 113, 0.1) !important; }
  .d2h-ins { background: rgba(74, 222, 128, 0.1) !important; }
  .d2h-del .d2h-code-line-ctn del { background: rgba(248, 113, 113, 0.25) !important; text-decoration: none !important; }
  .d2h-ins .d2h-code-line-ctn ins { background: rgba(74, 222, 128, 0.25) !important; text-decoration: none !important; }
  .d2h-info { background: var(--bg2) !important; color: var(--text3) !important; border-color: var(--border) !important; }
  .d2h-file-side-diff { width: 50% !important; }
  .d2h-code-linenumber { background: var(--bg2) !important; color: var(--text3) !important; border-color: var(--border) !important; }
  .d2h-emptyplaceholder { background: var(--bg2) !important; border-color: var(--border) !important; }
  .d2h-tag { display: none !important; }
  td.d2h-code-side-linenumber { background: var(--bg2) !important; color: var(--text3) !important; }
  .d2h-file-diff .d2h-del.d2h-change { background: rgba(248, 113, 113, 0.08) !important; }
  .d2h-file-diff .d2h-ins.d2h-change { background: rgba(74, 222, 128, 0.08) !important; }

  /* Node type breakdown */
  .type-breakdown {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.5rem; margin-top: 1.5rem; display: none;
  }
  .type-breakdown.visible { display: block; }
  .type-breakdown h3 { font-size: 0.9rem; color: var(--text2); margin-bottom: 0.75rem; }
  .type-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .type-chip {
    font-family: var(--mono); font-size: 0.75rem; padding: 0.3rem 0.7rem;
    border-radius: 6px; background: var(--bg); border: 1px solid var(--border);
  }
  .type-chip .delta { margin-left: 0.3rem; }
  .type-chip .delta.plus { color: var(--green); }
  .type-chip .delta.minus { color: var(--red); }

  /* Section headers */
  .section-header {
    font-size: 0.85rem; color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.08em; padding: 0.75rem 0 0.5rem; margin-top: 0.5rem;
    border-top: 1px solid var(--border);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .upload-row { grid-template-columns: 1fr; }
    .container { padding: 1rem; }
    .summary-stats { gap: 0.75rem; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; background: var(--green);
    color: var(--bg); padding: 0.6rem 1.2rem; border-radius: 8px;
    font-size: 0.85rem; font-weight: 600; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }

  /* Loading */
  .loading { text-align: center; padding: 2rem; color: var(--text3); }
  .loading .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.6s linear infinite; display: inline-block;
    margin-bottom: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Non-prompt change detail */
  .field-diff {
    font-family: var(--mono); font-size: 0.78rem; padding: 0.5rem 0.75rem;
    background: var(--bg); border-radius: 6px; margin-top: 0.5rem;
  }
  .field-diff .fd-row { padding: 0.15rem 0; }
  .field-diff .fd-field { color: var(--accent); }
  .field-diff .fd-old { color: var(--red); }
  .field-diff .fd-new { color: var(--green); }
  .node-data-preview {
    white-space: pre-wrap; color: var(--text2); font-size: 0.75rem;
    max-height: 300px; overflow: auto; font-family: var(--mono);
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>Flow Config</span> Diff Tool</h1>
  <span class="badge">Chat LHB</span>
</div>

<div class="container">
  <div class="upload-row">
    <div class="upload-zone" id="zone-before" tabindex="0">
      <div class="label">Before (Pre-deploy)</div>
      <div class="hint" id="hint-before">Drop JSON or click to browse</div>
      <div class="filename" id="fname-before"></div>
      <div class="node-count" id="count-before"></div>
      <input type="file" id="file-before" accept=".json">
    </div>
    <div class="upload-zone" id="zone-after" tabindex="0">
      <div class="label">After (Post-deploy)</div>
      <div class="hint" id="hint-after">Drop JSON or click to browse</div>
      <div class="filename" id="fname-after"></div>
      <div class="node-count" id="count-after"></div>
      <input type="file" id="file-after" accept=".json">
    </div>
  </div>

  <div class="compare-row">
    <button class="btn-compare" id="btn-compare" disabled>Compare</button>
  </div>

  <div class="summary-bar" id="summary-bar">
    <div class="summary-stats" id="summary-stats"></div>
    <div class="summary-actions">
      <button class="btn-sm" id="btn-export">Export Markdown</button>
      <button class="btn-sm" id="btn-copy">Copy Summary</button>
    </div>
  </div>

  <div class="filter-tabs" id="filter-tabs"></div>

  <div class="results" id="results"></div>

  <div class="type-breakdown" id="type-breakdown">
    <h3>Node Type Distribution</h3>
    <div class="type-grid" id="type-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ─── State ───────────────────────────────────────────
  var configBefore = null, configAfter = null;
  var lastResult = null;

  // ─── Constants ───────────────────────────────────────
  var GUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
  var POSITION_TOLERANCE = 50;

  var PROMPT_FIELDS = {
    advancedRouter: 'advancedRouterPrompt',
    model: 'systemPrompt',
    queryRewriter: 'queryRewriterSystemPrompt',
    intentAI: 'intentaiSystemPrompt',
  };

  var DOCUMENT_FIELDS = {
    documents: 'document',
  };

  var NAME_FIELDS = {
    advancedRouter: ['advancedRouterName'],
    model: ['customLabel', 'modelName', 'name'],
    intentGroup: ['intentGroupName'],
    intentAI: ['intentAIName'],
    documents: ['documentsName', 'name'],
    products: ['productsName', 'name'],
    response: ['responseName'],
    condition: ['conditionName'],
    'switch': ['switchName'],
    smartIntent: ['smartIntentName'],
    agent: ['agentName'],
    orchestrator: ['orchestratorName'],
  };

  // ─── Helpers ─────────────────────────────────────────
  function getNodeName(node) {
    var data = node.data || {};
    var nt = node.nodeType || '';
    var fields = NAME_FIELDS[nt] || [];
    for (var i = 0; i < fields.length; i++) {
      if (data[fields[i]]) return data[fields[i]];
    }
    return data.customLabel || data.name || '';
  }

  function getNodeLabel(node) {
    var nt = node.nodeType || '?';
    var name = getNodeName(node);
    return name ? nt + ' \u2014 ' + name : nt;
  }

  function posDistance(a, b) {
    var dx = (a.x || 0) - (b.x || 0);
    var dy = (a.y || 0) - (b.y || 0);
    return Math.sqrt(dx * dx + dy * dy);
  }

  function isGuid(val) {
    return typeof val === 'string' && GUID_RE.test(val);
  }

  function stripGuids(obj) {
    if (obj === null || obj === undefined) return obj;
    if (typeof obj === 'string') return isGuid(obj) ? '__GUID__' : obj;
    if (Array.isArray(obj)) return obj.map(stripGuids);
    if (typeof obj === 'object') {
      var out = {};
      var keys = Object.keys(obj);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var v = obj[k];
        if (k === 'id' && isGuid(v)) continue;
        if (k === 'nodeId' && isGuid(v)) continue;
        if (k.endsWith('Id') && isGuid(v)) continue;
        out[k] = stripGuids(v);
      }
      return out;
    }
    return obj;
  }

  function simpleHash(str) {
    var hash = 0;
    for (var i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash = hash & hash;
    }
    return hash.toString(36);
  }

  function parseFlowConfig(jsonStr) {
    var data = JSON.parse(jsonStr);
    if (!data.nodes || !Array.isArray(data.nodes)) {
      throw new Error('Invalid flow config: missing "nodes" array');
    }
    return data;
  }

  function countByType(nodes) {
    var counts = {};
    for (var i = 0; i < nodes.length; i++) {
      var t = nodes[i].nodeType || 'unknown';
      counts[t] = (counts[t] || 0) + 1;
    }
    return counts;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.textContent !== undefined ? div.innerHTML : '';
  }

  function setText(el, text) {
    el.textContent = text;
  }

  function toast(msg) {
    var el = document.getElementById('toast');
    setText(el, msg);
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
  }

  function truncate(str, max) {
    return str.length > max ? str.slice(0, max) + '...' : str;
  }

  // ─── Node Matching ───────────────────────────────────
  function matchNodes(nodesBefore, nodesAfter) {
    var afterByType = {};
    for (var i = 0; i < nodesAfter.length; i++) {
      var n = nodesAfter[i];
      var t = n.nodeType || '';
      if (!afterByType[t]) afterByType[t] = [];
      afterByType[t].push({ node: n, matched: false });
    }

    var matched = [];
    var removed = [];

    for (var bi = 0; bi < nodesBefore.length; bi++) {
      var nb = nodesBefore[bi];
      var nt = nb.nodeType || '';
      var candidates = afterByType[nt] || [];
      var nameBefore = getNodeName(nb);

      var bestMatch = null;
      var bestScore = -1;

      for (var ci = 0; ci < candidates.length; ci++) {
        if (candidates[ci].matched) continue;
        var na = candidates[ci].node;
        var nameAfter = getNodeName(na);

        if (nameBefore && nameAfter && nameBefore === nameAfter) {
          bestMatch = ci;
          bestScore = 1000;
          break;
        }

        var dist = posDistance(nb.position || {}, na.position || {});
        if (dist <= POSITION_TOLERANCE) {
          var score = POSITION_TOLERANCE - dist;
          if (score > bestScore) {
            bestScore = score;
            bestMatch = ci;
          }
        }
      }

      if (bestMatch !== null) {
        candidates[bestMatch].matched = true;
        matched.push({ before: nb, after: candidates[bestMatch].node });
      } else {
        removed.push(nb);
      }
    }

    var added = [];
    var typeKeys = Object.keys(afterByType);
    for (var ti = 0; ti < typeKeys.length; ti++) {
      var entries = afterByType[typeKeys[ti]];
      for (var ei = 0; ei < entries.length; ei++) {
        if (!entries[ei].matched) added.push(entries[ei].node);
      }
    }

    return { matched: matched, added: added, removed: removed };
  }

  // ─── Diff Computation ────────────────────────────────
  function categorizeNodeChanges(before, after) {
    var changes = [];
    var nt = before.nodeType || '';
    var dataBefore = stripGuids(before.data || {});
    var dataAfter = stripGuids(after.data || {});
    var promptField = PROMPT_FIELDS[nt];

    if (promptField) {
      var pBefore = (before.data || {})[promptField] || '';
      var pAfter = (after.data || {})[promptField] || '';
      if (pBefore !== pAfter) {
        changes.push({ category: 'prompt', field: promptField, before: pBefore, after: pAfter });
      }
    }

    var docField = DOCUMENT_FIELDS[nt];
    if (docField) {
      var dBefore = (before.data || {})[docField] || '';
      var dAfter = (after.data || {})[docField] || '';
      if (typeof dBefore === 'object') dBefore = JSON.stringify(dBefore, null, 2);
      if (typeof dAfter === 'object') dAfter = JSON.stringify(dAfter, null, 2);
      if (dBefore !== dAfter) {
        changes.push({ category: 'document', field: docField, before: dBefore, after: dAfter });
      }
    }

    var allKeys = {};
    var bKeys = Object.keys(dataBefore);
    var aKeys = Object.keys(dataAfter);
    for (var i = 0; i < bKeys.length; i++) allKeys[bKeys[i]] = true;
    for (var j = 0; j < aKeys.length; j++) allKeys[aKeys[j]] = true;

    var sortedKeys = Object.keys(allKeys).sort();
    for (var ki = 0; ki < sortedKeys.length; ki++) {
      var key = sortedKeys[ki];
      if (key === promptField) continue;
      if (key === docField) continue;
      var vb = dataBefore[key];
      var va = dataAfter[key];
      if (JSON.stringify(vb) === JSON.stringify(va)) continue;

      var cat = 'config';
      if (key === 'targets' || key.indexOf('route') >= 0 || key.indexOf('Route') >= 0 || key === 'advancedRouterOutputs') {
        cat = 'routing';
      }
      changes.push({ category: cat, field: key, before: vb, after: va });
    }

    var tBefore = stripGuids(before.targets || []);
    var tAfter = stripGuids(after.targets || []);
    if (JSON.stringify(tBefore) !== JSON.stringify(tAfter)) {
      changes.push({ category: 'routing', field: 'targets (connections)', before: before.targets || [], after: after.targets || [] });
    }

    return changes;
  }

  function deduplicatePromptChanges(allChanges) {
    var hashGroups = {};
    var hashOrder = [];
    var nonPromptChanges = [];

    for (var i = 0; i < allChanges.length; i++) {
      var entry = allChanges[i];
      var promptChange = null;
      for (var c = 0; c < entry.changes.length; c++) {
        if (entry.changes[c].category === 'prompt' || entry.changes[c].category === 'document') { promptChange = entry.changes[c]; break; }
      }

      if (!promptChange) {
        nonPromptChanges.push(entry);
        continue;
      }

      var hashKey = simpleHash(promptChange.before) + ':' + simpleHash(promptChange.after);
      if (!hashGroups[hashKey]) {
        var entryCopy = {
          type: entry.type, label: entry.label, nodeType: entry.nodeType,
          nodeName: entry.nodeName, changes: entry.changes,
          before: entry.before, after: entry.after,
          affectedNodes: [entry.label],
        };
        hashGroups[hashKey] = entryCopy;
        hashOrder.push(hashKey);
      } else {
        hashGroups[hashKey].affectedNodes.push(entry.label);
      }
    }

    var deduped = [];
    for (var h = 0; h < hashOrder.length; h++) {
      deduped.push(hashGroups[hashOrder[h]]);
    }
    return deduped.concat(nonPromptChanges);
  }

  function computeFullDiff(cfgA, cfgB) {
    var nodesA = cfgA.nodes || [];
    var nodesB = cfgB.nodes || [];
    var result = matchNodes(nodesA, nodesB);

    var allChanges = [];
    for (var i = 0; i < result.matched.length; i++) {
      var pair = result.matched[i];
      var changes = categorizeNodeChanges(pair.before, pair.after);
      if (changes.length > 0) {
        allChanges.push({
          type: 'changed', label: getNodeLabel(pair.before),
          nodeType: pair.before.nodeType, nodeName: getNodeName(pair.before),
          changes: changes, before: pair.before, after: pair.after,
        });
      }
    }

    var dedupedChanges = deduplicatePromptChanges(allChanges);
    var changedNodeCount = 0;
    for (var d = 0; d < dedupedChanges.length; d++) {
      changedNodeCount += dedupedChanges[d].affectedNodes ? dedupedChanges[d].affectedNodes.length : 1;
    }

    // Top-level flow config diff
    var flowConfigChanges = [];
    if ((cfgA.name || '') !== (cfgB.name || '')) {
      flowConfigChanges.push({ field: 'name', before: cfgA.name || '(none)', after: cfgB.name || '(none)' });
    }
    var metaA = cfgA.metadata || {};
    var metaB = cfgB.metadata || {};
    var metaKeys = {};
    var mak = Object.keys(metaA); var mbk = Object.keys(metaB);
    for (var mi = 0; mi < mak.length; mi++) metaKeys[mak[mi]] = true;
    for (var mj = 0; mj < mbk.length; mj++) metaKeys[mbk[mj]] = true;
    var sortedMeta = Object.keys(metaKeys).sort();
    for (var mk = 0; mk < sortedMeta.length; mk++) {
      var mkey = sortedMeta[mk];
      var mvA = metaA[mkey]; var mvB = metaB[mkey];
      if (JSON.stringify(mvA) !== JSON.stringify(mvB)) {
        flowConfigChanges.push({
          field: 'metadata.' + mkey,
          before: mvA == null ? '(none)' : String(mvA),
          after: mvB == null ? '(none)' : String(mvB),
        });
      }
    }

    return {
      totalBefore: nodesA.length, totalAfter: nodesB.length,
      matched: result.matched.length,
      added: result.added.map(function(n) { return { type: 'added', label: getNodeLabel(n), nodeType: n.nodeType, node: n }; }),
      removed: result.removed.map(function(n) { return { type: 'removed', label: getNodeLabel(n), nodeType: n.nodeType, node: n }; }),
      changed: dedupedChanges,
      flowConfig: flowConfigChanges,
      typesBefore: countByType(nodesA), typesAfter: countByType(nodesB),
      sameCount: result.matched.length - changedNodeCount,
    };
  }

      { cls: 'changed', text: 'Changed: ', num: changedCount + ' (' + result.changed.length + ' patterns)' },
      { cls: 'same', text: 'Unchanged: ', num: String(sameCount) },
    ];

    for (var s = 0; s < stats.length; s++) {
      var span = document.createElement('span');

  function renderFilterTabs(result) {
    var tabsEl = document.getElementById('filter-tabs');
    tabsEl.textContent = '';
    var counts = { all: 0, prompt: 0, document: 0, routing: 0, config: 0, flowconfig: 0, addremove: 0 };

    for (var i = 0; i < result.changed.length; i++) {
      var c = result.changed[i];
      var hasCats = {};
      if (c.changes) {
        for (var j = 0; j < c.changes.length; j++) hasCats[c.changes[j].category] = true;
      }
      if (hasCats.prompt) counts.prompt += (c.affectedNodes ? c.affectedNodes.length : 1);
      if (hasCats.document) counts.document += (c.affectedNodes ? c.affectedNodes.length : 1);
      if (hasCats.routing) counts.routing++;
      if (hasCats.config) counts.config++;
    }
    counts.flowconfig = result.flowConfig ? result.flowConfig.length : 0;
    counts.addremove = result.added.length + result.removed.length;
    counts.all = result.changed.length + (counts.addremove > 0 ? 1 : 0) + (counts.flowconfig > 0 ? 1 : 0);

    var tabs = [
      { id: 'all', label: 'All (' + counts.all + ')' },
      { id: 'flowconfig', label: 'Flow Config (' + counts.flowconfig + ')' },

      { id: 'document', label: 'Document (' + counts.document + ')' },
      { id: 'routing', label: 'Routing (' + counts.routing + ')' },
      { id: 'config', label: 'Config (' + counts.config + ')' },
      { id: 'addremove', label: 'Added/Removed (' + counts.addremove + ')' },
    ];

    for (var t = 0; t < tabs.length; t++) {
      var btn = document.createElement('button');
      btn.className = 'filter-tab' + (tabs[t].id === 'all' ? ' active' : '');
      btn.dataset.filter = tabs[t].id;
      setText(btn, tabs[t].label);

  function applyFilter(filter) {
    var cards = document.querySelectorAll('.change-card');
    for (var i = 0; i < cards.length; i++) {
      var cat = cards[i].dataset.category || '';
      if (filter === 'all') cards[i].style.display = '';
      else if (filter === 'addremove') cards[i].style.display = (cat === 'added' || cat === 'removed') ? '' : 'none';
      else if (filter === 'flowconfig') cards[i].style.display = cat === 'flowconfig' ? '' : 'none';
      else if (filter === 'document') cards[i].style.display = cat.indexOf('document') >= 0 ? '' : 'none';
      else cards[i].style.display = cat.indexOf(filter) >= 0 ? '' : 'none';
    }
    var headers = document.querySelectorAll('.section-header');
    for (var h = 0; h < headers.length; h++) {
      var hcat = headers[h].dataset.category || '';
      if (filter === 'all') headers[h].style.display = '';
      else if (filter === 'addremove') headers[h].style.display = (hcat === 'added' || hcat === 'removed') ? '' : 'none';
      else if (filter === 'flowconfig') headers[h].style.display = hcat === 'flowconfig' ? '' : 'none';
      else if (filter === 'document') headers[h].style.display = hcat.indexOf('document') >= 0 ? '' : 'none';
      else headers[h].style.display = hcat.indexOf(filter) >= 0 ? '' : 'none';
    }
  }

    nameEl.className = 'card-name';

    setText(fieldEl, fieldLabel);

      charsEl.appendChild(deltaSpan);
      charsEl.appendChild(document.createTextNode(')'));
      summary.appendChild(charsEl);
    }

    if (affectedCount > 1) {
      var affEl = document.createElement('span');
      affEl.className = 'card-affects';
      setText(affEl, 'x' + affectedCount + ' nodes');
      summary.appendChild(affEl);
    }

    card.appendChild(summary);

    var body = document.createElement('div');
    body.className = 'card-body';
    card.appendChild(body);

    card.addEventListener('toggle', function() {
      if (card.open && card.dataset.rendered === 'false') {
        card.dataset.rendered = 'true';
        renderCardBody(body, change);
      }
    });

    return card;
  }

  function renderCardBody(body, change) {
    // Affected nodes list
    if (change.affectedNodes && change.affectedNodes.length > 1) {
      var affDiv = document.createElement('div');
      affDiv.className = 'affected-list';
      setText(affDiv, 'Affects ' + change.affectedNodes.length + ' nodes: ' + change.affectedNodes.join(', '));
      body.appendChild(affDiv);
    }

    // Prompt/Document diff (side-by-side via diff2html)
    var promptChange = null;
    if (change.changes) {
      for (var i = 0; i < change.changes.length; i++) {
        if (change.changes[i].category === 'prompt' || change.changes[i].category === 'document') { promptChange = change.changes[i]; break; }
      }
    }

    if (promptChange) {
      var patch = Diff.createPatch(promptChange.field, promptChange.before, promptChange.after, 'before', 'after');
      var diffHtml = Diff2Html.html(patch, {
        drawFileList: false, matching: 'lines',
        outputFormat: 'side-by-side', renderNothingWhenEmpty: false,
      });
      var diffContainer = document.createElement('div');
      // diff2html output is from trusted library processing local data
      diffContainer.innerHTML = diffHtml; // eslint-disable-line -- safe: local data only
      body.appendChild(diffContainer);
    }

    // Other field changes
    var otherChanges = [];
    if (change.changes) {
      for (var j = 0; j < change.changes.length; j++) {
        if (change.changes[j].category !== 'prompt' && change.changes[j].category !== 'document') otherChanges.push(change.changes[j]);
      }
    }

    if (otherChanges.length > 0) {
      var fdDiv = document.createElement('div');
      fdDiv.className = 'field-diff';
      for (var k = 0; k < otherChanges.length; k++) {
        var c = otherChanges[k];
        var bStr = typeof c.before === 'object' ? JSON.stringify(c.before, null, 2) : String(c.before == null ? '(none)' : c.before);
        var aStr = typeof c.after === 'object' ? JSON.stringify(c.after, null, 2) : String(c.after == null ? '(none)' : c.after);
        var row = document.createElement('div');
        row.className = 'fd-row';

        var fieldSpan = document.createElement('span');
        fieldSpan.className = 'fd-field';
        setText(fieldSpan, c.field);
        row.appendChild(fieldSpan);
        row.appendChild(document.createTextNode(': '));

        if (bStr.length > 200 || aStr.length > 200) {
          row.appendChild(document.createTextNode('text changed (' + bStr.length.toLocaleString() + ' \u2192 ' + aStr.length.toLocaleString() + ' chars)'));
        } else {
          var oldSpan = document.createElement('span');
          oldSpan.className = 'fd-old';
          setText(oldSpan, truncate(bStr, 120));
          row.appendChild(oldSpan);
          row.appendChild(document.createTextNode(' \u2192 '));
          var newSpan = document.createElement('span');
          newSpan.className = 'fd-new';
          setText(newSpan, truncate(aStr, 120));
          row.appendChild(newSpan);
        }
        fdDiv.appendChild(row);
      }
      body.appendChild(fdDiv);
    }
  }

  function renderResults(result) {

      container.appendChild(renderFlowConfigCard(result.flowConfig));
    }

    // Separate into prompt, document, and other changes
    var promptChanges = [];
    var documentChanges = [];
    var otherChanges = [];
    for (var i = 0; i < result.changed.length; i++) {
      var c = result.changed[i];
      var hasPrompt = false;
      var hasDocument = false;
      if (c.changes) {
        for (var j = 0; j < c.changes.length; j++) {
          if (c.changes[j].category === 'prompt') hasPrompt = true;
          if (c.changes[j].category === 'document') hasDocument = true;
        }
      }
      if (hasPrompt) promptChanges.push(c);
      else if (hasDocument) documentChanges.push(c);
      else otherChanges.push(c);

  // ─── Export ──────────────────────────────────────────
  function generateMarkdown(result) {
    var changedCount = 0;
    for (var i = 0; i < result.changed.length; i++) {
      changedCount += result.changed[i].affectedNodes ? result.changed[i].affectedNodes.length : 1;
    }
    var sameCount = result.matched - changedCount;
    var lines = [];
    lines.push('# Flow Config Diff Report');
    lines.push('');
    lines.push('**Generated**: ' + new Date().toISOString().slice(0, 19).replace('T', ' '));
    lines.push('**Before**: ' + (configBefore._filename || 'unknown') + ' (' + result.totalBefore + ' nodes)');
    lines.push('**After**: ' + (configAfter._filename || 'unknown') + ' (' + result.totalAfter + ' nodes)');
    lines.push('');
    lines.push('## Summary');
    lines.push('');
    lines.push('| Metric | Count |');
    lines.push('|--------|-------|');
    lines.push('| Total nodes (after) | ' + result.totalAfter + ' |');
    lines.push('| Added | +' + result.added.length + ' |');
    lines.push('| Removed | -' + result.removed.length + ' |');
    lines.push('| Changed | ' + changedCount + ' (' + result.changed.length + ' unique patterns) |');
    lines.push('| Unchanged | ' + sameCount + ' |');
    lines.push('');

    if (result.flowConfig && result.flowConfig.length > 0) {
      lines.push('## Flow Config');
      lines.push('');
      lines.push('| Field | Before | After |');
      lines.push('|-------|--------|-------|');
      for (var fi = 0; fi < result.flowConfig.length; fi++) {
        var fc = result.flowConfig[fi];
        lines.push('| ' + fc.field + ' | ' + String(fc.before) + ' | ' + String(fc.after) + ' |');
      }
      lines.push('');
    }

    var promptChanges = result.changed.filter(function(c) {
      return c.changes && c.changes.some(function(ch) { return ch.category === 'prompt'; });
    });

    var documentChanges = result.changed.filter(function(c) {
      return c.changes && c.changes.some(function(ch) { return ch.category === 'document'; });
    });

    if (promptChanges.length > 0) {
      lines.push('## Prompt Changes');
      lines.push('');
      lines.push('| # | Node | Field | Chars | Delta | Affects |');
      lines.push('|---|------|-------|-------|-------|---------|');
      for (var pi = 0; pi < promptChanges.length; pi++) {
        var pc = null;
        for (var ci = 0; ci < promptChanges[pi].changes.length; ci++) {
          if (promptChanges[pi].changes[ci].category === 'prompt') { pc = promptChanges[pi].changes[ci]; break; }
        }
        var lenB = pc.before.length;
        var lenA = pc.after.length;
        var delta = lenA - lenB;
        var deltaStr = delta > 0 ? '+' + delta.toLocaleString() : delta.toLocaleString();
        var affects = promptChanges[pi].affectedNodes ? promptChanges[pi].affectedNodes.length : 1;
        lines.push('| ' + (pi + 1) + ' | ' + promptChanges[pi].label + ' | ' + pc.field + ' | ' + lenB.toLocaleString() + '\u2192' + lenA.toLocaleString() + ' | ' + deltaStr + ' | ' + affects + ' |');
      }
      lines.push('');
    }

    if (documentChanges.length > 0) {
      lines.push('## Document Changes');
      lines.push('');
      lines.push('| # | Node | Field | Chars | Delta | Affects |');
      lines.push('|---|------|-------|-------|-------|---------|');
      for (var dci = 0; dci < documentChanges.length; dci++) {
        var dcx = null;
        for (var dcj = 0; dcj < documentChanges[dci].changes.length; dcj++) {
          if (documentChanges[dci].changes[dcj].category === 'document') { dcx = documentChanges[dci].changes[dcj]; break; }
        }
        var dLenB = dcx.before.length;
        var dLenA = dcx.after.length;
        var dDelta = dLenA - dLenB;
        var dDeltaStr = dDelta > 0 ? '+' + dDelta.toLocaleString() : dDelta.toLocaleString();
        var dAffects = documentChanges[dci].affectedNodes ? documentChanges[dci].affectedNodes.length : 1;
        lines.push('| ' + (dci + 1) + ' | ' + documentChanges[dci].label + ' | ' + dcx.field + ' | ' + dLenB.toLocaleString() + '\u2192' + dLenA.toLocaleString() + ' | ' + dDeltaStr + ' | ' + dAffects + ' |');
      }
      lines.push('');
    }

    if (result.added.length > 0) {
      lines.push('## Added Nodes');
      lines.push('');
      for (var ai = 0; ai < result.added.length; ai++) lines.push('- **+** [' + result.added[ai].nodeType + '] ' + result.added[ai].label);
      lines.push('');
    }
    if (result.removed.length > 0) {
      lines.push('## Removed Nodes');
      lines.push('');
      for (var ri = 0; ri < result.removed.length; ri++) lines.push('- **-** [' + result.removed[ri].nodeType + '] ' + result.removed[ri].label);
      lines.push('');
    }

    lines.push('## Node Type Distribution');
    lines.push('');
    lines.push('| Type | Before | After | Delta |');
    lines.push('|------|--------|-------|-------|');
    var allTypes = {};
    var tbk = Object.keys(result.typesBefore);
    var tak = Object.keys(result.typesAfter);
    for (var tbi = 0; tbi < tbk.length; tbi++) allTypes[tbk[tbi]] = true;
    for (var tai = 0; tai < tak.length; tai++) allTypes[tak[tai]] = true;
    var sortedTypes = Object.keys(allTypes).sort();
    for (var sti = 0; sti < sortedTypes.length; sti++) {
      var tt = sortedTypes[sti];
      var b = result.typesBefore[tt] || 0;
      var a = result.typesAfter[tt] || 0;
      var d = a - b;
      var ds = d > 0 ? '+' + d : (d === 0 ? '' : String(d));
      lines.push('| ' + tt + ' | ' + b + ' | ' + a + ' | ' + ds + ' |');
    }
    lines.push('');

    if (promptChanges.length > 0) {
      lines.push('---');
      lines.push('');
      lines.push('## Detailed Prompt Diffs');
      lines.push('');
      for (var di = 0; di < promptChanges.length; di++) {
        var dpc = null;
        for (var dci = 0; dci < promptChanges[di].changes.length; dci++) {
          if (promptChanges[di].changes[dci].category === 'prompt') { dpc = promptChanges[di].changes[dci]; break; }
        }
        lines.push('### ' + (di + 1) + '. ' + promptChanges[di].label + ' \u2014 ' + dpc.field);
        lines.push('');
        if (promptChanges[di].affectedNodes && promptChanges[di].affectedNodes.length > 1) {
          lines.push('> Affects ' + promptChanges[di].affectedNodes.length + ' nodes: ' + promptChanges[di].affectedNodes.join(', '));
          lines.push('');
        }
        lines.push('**' + dpc.before.length.toLocaleString() + '** \u2192 **' + dpc.after.length.toLocaleString() + '** chars');
        lines.push('');
        var patch = Diff.createPatch(dpc.field, dpc.before, dpc.after, 'before', 'after');
        lines.push('```diff');
        lines.push(patch);
        lines.push('```');
        lines.push('');
      }
    }

    if (documentChanges.length > 0) {
      lines.push('---');
      lines.push('');
      lines.push('## Detailed Document Diffs');
      lines.push('');
      for (var ddi = 0; ddi < documentChanges.length; ddi++) {
        var ddpc = null;
        for (var ddci = 0; ddci < documentChanges[ddi].changes.length; ddci++) {
          if (documentChanges[ddi].changes[ddci].category === 'document') { ddpc = documentChanges[ddi].changes[ddci]; break; }
        }
        lines.push('### ' + (ddi + 1) + '. ' + documentChanges[ddi].label + ' \u2014 ' + ddpc.field);
        lines.push('');
        if (documentChanges[ddi].affectedNodes && documentChanges[ddi].affectedNodes.length > 1) {
          lines.push('> Affects ' + documentChanges[ddi].affectedNodes.length + ' nodes: ' + documentChanges[ddi].affectedNodes.join(', '));
          lines.push('');
        }
        lines.push('**' + ddpc.before.length.toLocaleString() + '** \u2192 **' + ddpc.after.length.toLocaleString() + '** chars');
        lines.push('');
        var dpatch = Diff.createPatch(ddpc.field, ddpc.before, ddpc.after, 'before', 'after');
        lines.push('```diff');
        lines.push(dpatch);
        lines.push('```');
        lines.push('');
      }
    }

    return lines.join('\n');
  }

  function exportMarkdown(result) {
    var md = generateMarkdown(result);
    var blob = new Blob([md], { type: 'text/markdown' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'flow-diff-' + new Date().toISOString().slice(0, 10) + '.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Markdown exported');
  }

  function copySummary(result) {
    var changedCount = 0;
    for (var i = 0; i < result.changed.length; i++) {
      changedCount += result.changed[i].affectedNodes ? result.changed[i].affectedNodes.length : 1;
    }
    var sameCount = result.matched - changedCount;
    var textParts = [
      'Flow Config Diff: ' + result.totalBefore + ' \u2192 ' + result.totalAfter + ' nodes',
      'Added: +' + result.added.length + ' | Removed: -' + result.removed.length + ' | Changed: ' + changedCount + ' (' + result.changed.length + ' patterns) | Same: ' + sameCount,
    ];
    if (result.flowConfig && result.flowConfig.length > 0) {
      textParts.push('Flow Config: ' + result.flowConfig.map(function(f) { return f.field + ': ' + f.before + ' \u2192 ' + f.after; }).join(', '));
    }
    textParts.push('');
    var promptChanges = result.changed.filter(function(c) {
      return c.changes && c.changes.some(function(ch) { return ch.category === 'prompt'; });
    });
    for (var p = 0; p < promptChanges.length; p++) {
      var pc = null;
      for (var ci = 0; ci < promptChanges[p].changes.length; ci++) {
        if (promptChanges[p].changes[ci].category === 'prompt') { pc = promptChanges[p].changes[ci]; break; }
      }
      var affects = promptChanges[p].affectedNodes ? ' (x' + promptChanges[p].affectedNodes.length + ')' : '';
      textParts.push((p + 1) + '. ' + promptChanges[p].label + affects + ' \u2014 ' + pc.field + ': ' + pc.before.length.toLocaleString() + '\u2192' + pc.after.length.toLocaleString() + ' chars');
    }
    navigator.clipboard.writeText(textParts.join('\n')).then(function() { toast('Copied to clipboard'); });
  }

  // ─── Upload Handlers ─────────────────────────────────
  function setupUploadZone(zoneId, fileId, hintId, fnameId, countId, side) {
    var zone = document.getElementById(zoneId);
    var fileInput = document.getElementById(fileId);

    zone.addEventListener('click', function() { fileInput.click(); });
    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault();
      zone.classList.remove('dragover');
      var file = e.dataTransfer.files[0];
      if (file) handleFile(file, side, zone, hintId, fnameId, countId);
    });
    fileInput.addEventListener('change', function() {
      var file = fileInput.files[0];
      if (file) handleFile(file, side, zone, hintId, fnameId, countId);
    });
  }

  function handleFile(file, side, zone, hintId, fnameId, countId) {
    var reader = new FileReader();
    reader.onload = function() {
      try {
        var config = parseFlowConfig(reader.result);
        config._filename = file.name;
        if (side === 'before') configBefore = config;
        else configAfter = config;

        zone.classList.add('loaded');
        document.getElementById(hintId).style.display = 'none';
        setText(document.getElementById(fnameId), file.name);

        var types = countByType(config.nodes);
        var entries = Object.entries(types).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 4);
        var typeStr = entries.map(function(e) { return e[0] + ': ' + e[1]; }).join(', ');
        setText(document.getElementById(countId), config.nodes.length + ' nodes (' + typeStr + ')');

        updateCompareButton();
      } catch (err) {
        alert('Error parsing ' + file.name + ': ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  function updateCompareButton() {
    document.getElementById('btn-compare').disabled = !(configBefore && configAfter);
  }

  // ─── Main ────────────────────────────────────────────
  function runCompare() {
    var resultsEl = document.getElementById('results');
    resultsEl.textContent = '';
    resultsEl.classList.add('visible');

    var loadDiv = document.createElement('div');
    loadDiv.className = 'loading';
    var spinner = document.createElement('div');
    spinner.className = 'spinner';
    loadDiv.appendChild(spinner);
    var loadText = document.createElement('div');
    setText(loadText, 'Computing diff...');
    loadDiv.appendChild(loadText);
    resultsEl.appendChild(loadDiv);

    document.getElementById('summary-bar').classList.remove('visible');
    document.getElementById('filter-tabs').classList.remove('visible');
    document.getElementById('type-breakdown').classList.remove('visible');

    requestAnimationFrame(function() {
      setTimeout(function() {
        try {
          lastResult = computeFullDiff(configBefore, configAfter);
          renderSummary(lastResult);
          renderFilterTabs(lastResult);
          renderResults(lastResult);
          renderTypeBreakdown(lastResult);
        } catch (err) {
          resultsEl.textContent = '';
          var errDiv = document.createElement('div');
          errDiv.className = 'loading';
          errDiv.style.color = 'var(--red)';
          setText(errDiv, 'Error: ' + err.message);
          resultsEl.appendChild(errDiv);
        }
      }, 50);
    });
  }

  // ─── Init ────────────────────────────────────────────
  setupUploadZone('zone-before', 'file-before', 'hint-before', 'fname-before', 'count-before', 'before');
  setupUploadZone('zone-after', 'file-after', 'hint-after', 'fname-after', 'count-after', 'after');
  document.getElementById('btn-compare').addEventListener('click', runCompare);
  document.getElementById('btn-export').addEventListener('click', function() { if (lastResult) exportMarkdown(lastResult); });
  document.getElementById('btn-copy').addEventListener('click', function() { if (lastResult) copySummary(lastResult); });
})();
</script>
</body>
